name: Feature Request
description: Suggest a new feature for Sencho
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered
  - type: dropdown
    id: scope
    attributes:
      label: Feature scope
      options:
        - Dashboard / UI
        - Stack management
        - Multi-node / remote nodes
        - App Store
        - Observability / Logs
        - Settings / Configuration
        - Docker / Infrastructure
        - API
        - Other
    validations:
      required: true
