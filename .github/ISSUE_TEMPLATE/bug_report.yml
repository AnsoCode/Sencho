name: Bug Report
description: Report a bug in Sencho
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sencho version
      placeholder: "0.2.2"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Docker run
        - Development (npm run dev)
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if UI issue)
      placeholder: "Chrome 120, Firefox 121, etc."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant container or browser console logs
      render: shell
