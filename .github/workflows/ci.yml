name: Sencho CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build (TypeScript)
        working-directory: ./backend
        run: npm run build

      - name: Unit Tests (Vitest)
        working-directory: ./backend
        run: npm test

      - name: Lint (ESLint)
        working-directory: ./backend
        run: npm run lint

      - name: Audit Dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build (Vite/React)
        working-directory: ./frontend
        run: npm run build

      - name: Lint (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: Audit Dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high

  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sencho:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sencho:pr-test
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          format: 'table'
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create compose directory
        run: mkdir -p /tmp/compose

      - name: Start backend
        working-directory: ./backend
        run: node dist/index.js &
        env:
          JWT_SECRET: ci-test-secret-key-not-for-production
          COMPOSE_DIR: /tmp/compose
          PORT: 3000
          NODE_ENV: test

      - name: Start frontend dev server
        working-directory: ./frontend
        run: npm run dev &

      - name: Wait for services to be ready
        run: npx wait-on http://localhost:3000/api/health http://localhost:5173 --timeout 30000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_USERNAME: admin
          E2E_PASSWORD: password123

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/report/
            test-results/
          retention-days: 7

  sync-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout Sencho repo
        uses: actions/checkout@v4
        with:
          path: sencho

      - name: Checkout sencho-docs repo
        uses: actions/checkout@v4
        with:
          repository: AnsoCode/sencho-docs
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: sencho-docs

      - name: Copy /docs into sencho-docs root
        run: rsync -av --delete sencho/docs/ sencho-docs/

      - name: Commit and push to sencho-docs
        working-directory: sencho-docs
        run: |
          git config user.email "docs-bot@sencho.io"
          git config user.name "Sencho Docs Bot"
          git add -A
          git commit -m "docs: sync from develop@${{ github.sha }}" || echo "No changes to commit"
          git push
